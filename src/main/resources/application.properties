spring.application.name=gateway

# Kafka
spring.kafka.bootstrap-servers=192.168.18.192:9092
kafka.topic.market-quote=market-quote

# SCB WebSocket
scb.websocket.uri=ws://localhost:3000/scale/v1/ws-service/quotes/client-001
scb.websocket.reconnect.initial-delay-ms=1000
scb.websocket.reconnect.max-delay-ms=30000

# SCB Subscription HTTP
scb.subscription.url=https://<hostname>:<port>/scale/v1/stream-service/subscribe/{clientId}/{rateCatId}
scb.client-id=<clientId>
scb.rate-category-id=<rateCatId>

# Disruptor
disruptor.ring-buffer-size=1024

# Kafka Batch Publishing
kafka.batch.max-size=200000
kafka.batch.flush-interval-ms=10000
kafka.batch.worker-count=2
kafka.batch.queue-capacity=1000000
